on:
  workflow_call:
    inputs:
      name:
        type: string
        description: The name of the workflow to call.
        required: true
      artifact-name:
        type: string
        description: The name of the artifact.
        default: NuGet
      code-sign:
        type: boolean
        description: Whether to code sign the build or not.
        default: false
        required: false
      codeSignEndpoint:
        type: string
        description: >
          The Azure Artifact Signing account endpoint URI for your region. When set, packages are
          signed with Azure Artifact Signing instead of Azure Key Vault.
        required: false
        default: ''
      codeSignAccountName:
        type: string
        description: The Azure Artifact Signing account name (used when codeSignEndpoint is set).
        required: false
        default: ''
      codeSignCertificateProfile:
        type: string
        description: The Azure Artifact Signing certificate profile name (used when codeSignEndpoint is set).
        required: false
        default: ''
    secrets:
      feedUrl:
        required: false
      apiKey:
        required: true
      codeSignTimestampUrl:
        description: The url to the timestamp server.
        required: false
      codeSignKeyVault:
        description: The name of the Azure KeyVault to use.
        required: false
      codeSignClientId:
        description: The client id to use to access the KeyVault.
        required: false
      codeSignTenantId:
        description: The tenant id to use to access the KeyVault.
        required: false
      codeSignClientSecret:
        description: The client secret to use to access the KeyVault.
        required: false
      codeSignCertificate:
        description: The name of the certificate to use to code sign the build.
        required: false

jobs:
  deploy:
    name: ${{ inputs.name }}
    runs-on: windows-latest
    env:
      DOTNET_SYSTEM_CONSOLE_ALLOW_ANSI_COLOR_REDIRECTION: true
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.artifact-name }}
          path: Artifacts/

      - name: Sign Packages
        if: ${{ inputs.code-sign }}
        uses: avantipoint/workflow-templates/.github/actions/sign-packages@master
        with:
          artifacts-path: Artifacts/
          timestamp-url: ${{ secrets.codeSignTimestampUrl }}
          key-vault: ${{ secrets.codeSignKeyVault }}
          certificate: ${{ secrets.codeSignCertificate }}
          endpoint: ${{ inputs.codeSignEndpoint }}
          signing-account-name: ${{ inputs.codeSignAccountName }}
          certificate-profile-name: ${{ inputs.codeSignCertificateProfile }}
          client-id: ${{ secrets.codeSignClientId }}
          tenant-id: ${{ secrets.codeSignTenantId }}
          client-secret: ${{ secrets.codeSignClientSecret }}

      - name: ${{ inputs.name }}
        uses: dansiegel/publish-nuget@master
        with:
            filename: 'Artifacts/*.nupkg'
            feedUrl: ${{ secrets.feedUrl }}
            apiKey: ${{ secrets.apiKey }}